<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>site down</title>

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;

        background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
        background-size: 400% 100%;
        animation: rainbow 6s linear infinite;
      }

      @keyframes rainbow {
        from {
          background-position: 0% 50%;
        }

        to {
          background-position: 400% 50%;
        }
      }

      img {
        max-width: 90vw;
        max-height: 90vh;
      }
    </style>
  </head>

  <body>
    <img src="img.png" alt="site is cooked" />
  </body>
</html>
